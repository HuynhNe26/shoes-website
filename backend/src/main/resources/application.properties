spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/shoes_website}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

app.frontend-origin=${FRONTEND_ORIGIN:http://localhost:5173}
app.cookie-secure=${COOKIE_SECURE:false}
app.jwt.secret=${JWT_SECRET_KEY:${JWT_SERECT_KEY:change-me-in-env}}
app.jwt.access-token-seconds=${JWT_ACCESS_TOKEN_SECONDS:900}
app.jwt.refresh-token-seconds=${JWT_REFRESH_TOKEN_SECONDS:1209600}
app.resend.api-key=${API_RESEND_KEY:}
app.resend.from-email=${RESEND_FROM_EMAIL:no-reply@shoes.local}
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-1.5-flash}
app.cloudinary-url=${CLOUDINARY_URL:}
app.oauth.google-client-id=${GOOGLE_CLIENT_ID:}
app.oauth.apple-client-id=${APPLE_CLIENT_ID:}
